<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills — Karthikeshwar Ananthapur</title>
  <meta name="description" content="Technical skills of Karthikeshwar Ananthapur including languages, frameworks, and tools." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav id="navbar"></nav>

<main>
  <div class="page-hero">
    <p class="section-label">// skills</p>
    <h1>Technical Skills</h1>
    <p>Technologies and tools I work with.</p>
  </div>

  <div id="skills-container"></div>
</main>

<footer id="footer"></footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const { languages, frameworks, tools } = portfolioData.skills;
    const groups = [
      { label: '// languages', items: languages },
      { label: '// frameworks & libraries', items: frameworks },
      { label: '// tools', items: tools }
    ];

    document.getElementById('skills-container').innerHTML = groups.map(g => `
      <div class="skills-group">
        <p class="skills-group-title">${g.label}</p>
        <div class="skills-list">
          ${g.items.map(i => `<span class="skill-item">${i}</span>`).join('')}
        </div>
      </div>
    `).join('');
  });
</script>

</body>
</html>
