<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Karthikeshwar Ananthapur</title>
  <meta name="description" content="Project details — Karthikeshwar Ananthapur portfolio." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Assets (FIXED PATHS) -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav id="navbar"></nav>

  <!-- Main Content -->
  <main id="detail-main"></main>

  <!-- Footer -->
  <footer id="footer"></footer>

  <!-- Scripts (FIXED PATHS) -->
  <script src="/js/data.js"></script>
  <script src="/js/main.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {

      // 🔥 Get ID from clean URL: /details/123
      let id = window.location.pathname.split("/")[2];

      // 🔁 Fallback: /details?id=123
      if (!id) {
        const params = new URLSearchParams(window.location.search);
        id = params.get('id');
      }

      const main = document.getElementById('detail-main');

      // 🚫 If no ID at all
      if (!id) {
        main.innerHTML = `
          <div class="not-found">
            <h2>Invalid URL</h2>
            <p>No project ID provided.</p>
            <a href="/projects" class="btn btn-outline" style="margin-top:1rem">← Back to Projects</a>
          </div>
        `;
        return;
      }

      // 🔍 Find project
      const project = portfolioData.projects.find(p => p.id == id);

      // 🚫 If project not found
      if (!project) {
        main.innerHTML = `
          <div class="not-found">
            <h2>404</h2>
            <p>Project not found.</p>
            <a href="/projects" class="btn btn-outline" style="margin-top:1rem">← Back to Projects</a>
          </div>
        `;
        return;
      }

      // 🧠 Update page title
      document.title = `${project.title} — Karthikeshwar Ananthapur`;

      // 🎯 Render content
      main.innerHTML = `
        <a href="/projects" class="detail-back">← Back to Projects</a>

        <p class="section-label">// project</p>
        <h1 class="detail-title">${project.title}</h1>
        <p class="detail-desc">${project.details || project.description}</p>

        <div class="detail-section">
          <h3>// tech stack</h3>
          <div class="tech-stack">
            ${project.tech.map(t => `<span class="tech-tag">${t}</span>`).join('')}
          </div>
        </div>

        ${project.features ? `
        <div class="detail-section">
          <h3>// features</h3>
          <ul class="features-list">
            ${project.features.map(f => `<li>${f}</li>`).join('')}
          </ul>
        </div>` : ''}

        <div class="detail-section">
          <a href="${project.github}" target="_blank" rel="noopener" class="btn btn-primary">
            ↗ View on GitHub
          </a>
        </div>
      `;
    });
  </script>

</body>
</html>
